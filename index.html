<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Nhà Trọ Eden - Quản lý nhà trọ trên Telegram">
    <title>Nhà Trọ Eden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 🔒 Security Gate: Only allow access from Telegram -->
    <script>
        (function () {
            // ✅ Allowed Telegram User IDs (same as OWNER_CHAT_IDS in bot)
            var ALLOWED_IDS = [320838772];

            // Check 1: Must be inside real Telegram app
            var isRealTelegram = !!(window.TelegramWebviewProxy ||
                (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData && window.Telegram.WebApp.initData.length > 50));

            if (!isRealTelegram) {
                document.addEventListener('DOMContentLoaded', function () {
                    document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0f0f23;color:#e4e4e7;font-family:Inter,sans-serif;text-align:center;padding:20px;">' +
                        '<div style="font-size:64px;margin-bottom:20px;">🔒</div>' +
                        '<h1 style="font-size:22px;font-weight:700;margin-bottom:10px;color:#f87171;">Truy cập bị từ chối</h1>' +
                        '<p style="font-size:14px;color:#a1a1aa;max-width:300px;line-height:1.6;">' +
                        'Ứng dụng này chỉ hoạt động trong <strong style="color:#818cf8;">Telegram</strong>.<br><br>' +
                        'Vui lòng mở qua bot <strong style="color:#818cf8;">Nhà Trọ Eden</strong> trên Telegram để sử dụng.</p>' +
                        '<a href="https://t.me" style="margin-top:24px;padding:12px 24px;background:#6366f1;border-radius:12px;text-decoration:none;">' +
                        '<span style="color:white;font-weight:600;font-size:14px;">📱 Mở Telegram</span></a></div>';
                });
                window.__BLOCKED__ = true;
                return;
            }

            // Check 2: Must be an authorized user
            var tgApp = window.Telegram.WebApp;
            var userId = tgApp.initDataUnsafe && tgApp.initDataUnsafe.user ? tgApp.initDataUnsafe.user.id : null;

            if (!userId || ALLOWED_IDS.indexOf(userId) === -1) {
                document.addEventListener('DOMContentLoaded', function () {
                    document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0f0f23;color:#e4e4e7;font-family:Inter,sans-serif;text-align:center;padding:20px;">' +
                        '<div style="font-size:64px;margin-bottom:20px;">⛔</div>' +
                        '<h1 style="font-size:22px;font-weight:700;margin-bottom:10px;color:#f87171;">Không có quyền truy cập</h1>' +
                        '<p style="font-size:14px;color:#a1a1aa;max-width:300px;line-height:1.6;">' +
                        'Tài khoản Telegram của bạn không được cấp quyền sử dụng ứng dụng này.<br><br>' +
                        'Liên hệ quản trị viên để được cấp quyền.</p>' +
                        '<div style="margin-top:16px;padding:8px 16px;background:rgba(99,102,241,0.15);border-radius:8px;">' +
                        '<span style="color:#a1a1aa;font-size:12px;">Your ID: ' + (userId || 'unknown') + '</span></div></div>';
                });
                window.__BLOCKED__ = true;
                return;
            }
        })();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">
            <div class="loading-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <h1 class="loading-title">Nhà Trọ <span>Eden</span></h1>
            <p class="loading-subtitle">Đang tải dữ liệu...</p>
            <div class="loading-bar">
                <div class="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div class="app" id="app" style="display:none;">
        <!-- Header -->
        <header class="app-header" id="appHeader">
            <div class="header-left">
                <button class="back-btn" id="backBtn" style="display:none;">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div class="header-brand">
                    <i data-lucide="building-2" class="brand-icon"></i>
                    <span class="brand-text">Nhà Trọ <span class="accent">Eden</span></span>
                </div>
            </div>
            <h2 class="header-title" id="headerTitle">Tổng quan</h2>
            <div class="header-right">
                <button class="header-action" id="refreshBtn" aria-label="Refresh">
                    <i data-lucide="refresh-cw"></i>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <main class="app-content" id="appContent">
            <!-- Dashboard Page -->
            <section class="page active" id="pageDashboard">
                <!-- Stats Cards -->
                <div class="stats-grid" id="statsGrid"></div>
                <!-- Quick Actions -->
                <div class="section-card">
                    <h3 class="section-title">
                        <i data-lucide="zap"></i>
                        Thao tác nhanh
                    </h3>
                    <div class="quick-actions" id="quickActions"></div>
                </div>
                <!-- Unpaid Invoices -->
                <div class="section-card" id="unpaidSection">
                    <h3 class="section-title">
                        <i data-lucide="alert-circle"></i>
                        Hóa đơn chưa thanh toán
                    </h3>
                    <div class="invoice-list" id="unpaidList"></div>
                </div>
            </section>

            <!-- Rooms Page -->
            <section class="page" id="pageRooms">
                <div class="filter-bar" id="roomFilter"></div>
                <div class="rooms-grid" id="roomsGrid"></div>
            </section>

            <!-- Room Detail Page -->
            <section class="page" id="pageRoomDetail">
                <div id="roomDetailContent"></div>
            </section>

            <!-- Tenants Page -->
            <section class="page" id="pageTenants">
                <div class="tenant-list" id="tenantList"></div>
            </section>

            <!-- Invoices Page -->
            <section class="page" id="pageInvoices">
                <div class="invoice-filter-bar" id="invoiceFilter"></div>
                <div class="invoice-list-full" id="invoiceListFull"></div>
            </section>

            <!-- Services Page -->
            <section class="page" id="pageServices">
                <div class="service-list" id="serviceList"></div>
            </section>

            <!-- Settings Page -->
            <section class="page" id="pageSettings">
                <div id="settingsContent"></div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-btn active" data-page="dashboard">
                <i data-lucide="layout-dashboard"></i>
                <span>Tổng quan</span>
            </button>
            <button class="nav-btn" data-page="rooms">
                <i data-lucide="door-open"></i>
                <span>Phòng</span>
            </button>
            <button class="nav-btn" data-page="tenants">
                <i data-lucide="users"></i>
                <span>Người thuê</span>
            </button>
            <button class="nav-btn" data-page="invoices">
                <i data-lucide="receipt"></i>
                <span>Hóa đơn</span>
            </button>
            <button class="nav-btn" data-page="settings">
                <i data-lucide="settings"></i>
                <span>Cài đặt</span>
            </button>
        </nav>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle"></h3>
                <button class="modal-close" id="modalClose">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>if (!window.__BLOCKED__) {</script>
    <script src="firebase-init.js?v=2.3"></script>
    <script src="store.js?v=2.3"></script>
    <script src="app.js?v=2.3"></script>
    <script>}</script>
</body>

</html>
